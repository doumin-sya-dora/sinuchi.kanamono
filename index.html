<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金物配置ツール</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.wrapper {
  max-width: 1000px;
  margin: auto;
}

.diagram-stage {
  position: relative;
  width: 100%;
}

.diagram-canvas {
  position: relative;
  transform-origin: top left;
}

.diagram-canvas img {
  width: 100%;
  display: block;
}

.overlay-input {
  position: absolute;
  background: rgba(0,128,255,0.2);
  border: 2px solid #007bff;
  text-align: center;
  cursor: move;
}

.overlay-label {
  position: absolute;
  font-size: 12px;
  color: #000;
}

.layout-edit-on .overlay-input {
  background: rgba(255,0,0,0.2);
  border: 2px solid red;
}

button {
  margin: 10px;
}
</style>
</head>

<body>

<div class="wrapper">

<button id="toggleLayoutEditBtn">配置調整モード: OFF</button>

<div class="diagram-stage">
  <div class="diagram-canvas" id="canvas">

    <img src="vertical.png">

    <!-- ボックス例 -->
    <input class="overlay-input" data-link="A" style="left:100px;top:100px;width:100px;height:40px;">
    <div class="overlay-label" data-for="A" style="left:100px;top:70px;">A</div>

    <input class="overlay-input" data-link="B" style="left:100px;top:200px;width:100px;height:40px;">
    <div class="overlay-label" data-for="B" style="left:100px;top:170px;">B</div>

  </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
